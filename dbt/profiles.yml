marketpulse:
  target: dev
  outputs:
    dev:
      type: postgres
      host: "{{ env_var('POSTGRES_HOST', 'mp_postgres') }}"
      port: "{{ env_var('POSTGRES_PORT', '5432') | int }}"
      user: "{{ env_var('POSTGRES_USER', 'postgres') }}"
      password: "{{ env_var('POSTGRES_PASSWORD', 'postgres') }}"
      dbname: "{{ env_var('POSTGRES_DB', 'marketpulse') }}"
      schema: "{{ env_var('DB_SCHEMA_STAGING', 'analytics') }}"
      threads: "{{ env_var('DBT_THREADS', '4') | int }}"